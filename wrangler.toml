# Cloudflare Wrangler configuration
# Used for D1 database migration and local development

name = "hiking-3d"

[[d1_databases]]
binding = "DB"
database_name = "hiking-db"
database_id = ""  # Fill in after creating D1 database in Cloudflare dashboard

[env.production]
d1_databases = [
  { binding = "DB", database_name = "hiking-db", database_id = "" }
]
